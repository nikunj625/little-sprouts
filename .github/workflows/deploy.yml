name: Deploy PWA to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Inject Supabase keys (set these in Settings → Variables → Actions)
      - name: Write config.js
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          VAPID_PUBLIC_KEY: ${{ vars.VAPID_PUBLIC_KEY }}
        run: |
          cat > public/config.js <<'CONFIGEOF'
          window.LS_CONFIG = {
            SUPABASE_URL: "REPLACE_URL",
            SUPABASE_ANON_KEY: "REPLACE_ANON",
            VAPID_PUBLIC_KEY: "REPLACE_VAPID"
          };
          CONFIGEOF
          sed -i "s|REPLACE_URL|${SUPABASE_URL}|g" public/config.js
          sed -i "s|REPLACE_ANON|${SUPABASE_ANON_KEY}|g" public/config.js
          sed -i "s|REPLACE_VAPID|${VAPID_PUBLIC_KEY}|g" public/config.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
